    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    />

    <link
      rel="preload"
      as="image"
      href="/images/main/cover.avif"
      type="image/avif"
      fetchpriority="high"
    />

    <title>Clube Desportivo Infante Dom Henrique</title>

    <script>
      try {
        if (
          localStorage.getItem("theme") === "dark" ||
          (!("theme" in localStorage) &&
            window.matchMedia("(prefers-color-scheme: dark)").matches)
        ) {
          document.documentElement.classList.add("dark");
        }
      } catch (e) {}
    </script>

    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash,
          );
        }
      })(window.location);
    </script>
    <script src="https://web3forms.com/client/script.js" async defer></script>
  </head>
  <body>
    <div id="root">
      <style>
        #initial-loader {
          display: flex;
          justify-content: center;
          align-items: center;
          height: 100vh;
          width: 100vw;
          background-color: #fdfdfd; /* Light theme background */
        }
        .spinner {
          width: 40px;
          height: 40px;
          border: 4px solid rgba(182, 23, 30, 0.1);
          border-top-color: #b6171e; /* Brand Red */
          border-radius: 50%;
          animation: spin 1s linear infinite;
        }
        @keyframes spin {
          to {
            transform: rotate(360deg);
          }
        }
        @media (prefers-color-scheme: dark) {
          #initial-loader {
            background-color: #020202; /* Dark theme background */
          }
        }
      </style>
      <div id="initial-loader">
        <div class="spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
