# Deploy React + Vite app to GitHub Pages
# This workflow runs on pushes to the main branch and deploys the app to GitHub Pages
name: 🚀 Deploy to GitHub Pages
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: write-all

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: "🚀 Deploy React + Vite app to GitHub Pages"
    steps:
      - name: "🐧 Checkout code"
        uses: actions/checkout@v4
      - name: "⚙️ Set up Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: "📦 Install dependencies"
        run: npm install --legacy-peer-deps
      - name: "🏗️ Build the app"
        run: npm run build
      - name: "🚀 Deploy to GitHub Pages"
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          cname: cdinfante.harryvasanth.com
